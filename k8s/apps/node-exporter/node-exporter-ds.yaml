apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    name: node-exporter
    type: back-end
spec:
  template:
    metadata:
      name: node-exporter
      labels:
        app: node-exporter
        type: back-end
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:latest
          ports:
          - containerPort: 9100
  selector:
    matchLabels:
      app: node-exporter
