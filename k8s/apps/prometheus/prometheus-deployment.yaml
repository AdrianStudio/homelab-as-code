apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    type: back-end
spec:
  replicas: 1
  template:
    metadata:
      name: prometheus
      labels:
        app: prometheus
        type: back-end
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
          - containerPort: 9090
  selector:
    matchLabels:
      app: prometheus
