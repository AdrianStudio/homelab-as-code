apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: apps
  labels:
    app: uptime-kuma
    type: front-end
spec:
  replicas: 1
  template:
    metadata:
      name: uptime-kuma
      labels:
        app: uptime-kuma
        type: front-end
    spec:
      containers:
      - name: uptime-kuma
        image: louislam/uptime-kuma:1
        ports:
        - containerPort: 3001
  selector:
    matchLabels:
      app: uptime-kuma
